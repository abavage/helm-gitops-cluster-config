infrastructure:
  - chart: test-app
    namespace: test-app
    version: 0.0.5
    values:
      image: registry.redhat.io/rhel10/httpd-24:latest
      roleArn: arn:aws:iam::611093862211:role/one-external-secret-store-test-app
      region: ap-southeast-2
      clustername: one
      awsSecretStore: one-test-app-secrets
      awsSecretStoreProperty: rosa_api_token
